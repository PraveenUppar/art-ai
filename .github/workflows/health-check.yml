name: Production Health Check

on:
  schedule:
    # Run every 5 minutes
    - cron: "*/5 * * * *"

  workflow_dispatch:
    inputs:
      notify_on_success:
        description: "Send notification even on success"
        required: false
        type: boolean
        default: false

jobs:
  health-check:
    name: Check Production Health
    runs-on: ubuntu-latest

    steps:
      - name: Check Frontend Health
        id: frontend
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.FRONTEND_URL }}/api/health" || echo "000")
          echo "status=$RESPONSE" >> $GITHUB_OUTPUT
          if [ "$RESPONSE" != "200" ]; then
            echo "Frontend health check failed with status: $RESPONSE"
            echo "healthy=false" >> $GITHUB_OUTPUT
          else
            echo "Frontend is healthy"
            echo "healthy=true" >> $GITHUB_OUTPUT
          fi

      - name: Check Backend Health
        id: backend
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.BACKEND_URL }}/healthz" || echo "000")
          echo "status=$RESPONSE" >> $GITHUB_OUTPUT
          if [ "$RESPONSE" != "200" ]; then
            echo "Backend health check failed with status: $RESPONSE"
            echo "healthy=false" >> $GITHUB_OUTPUT
          else
            echo "Backend is healthy"
            echo "healthy=true" >> $GITHUB_OUTPUT
          fi

      - name: Notify Superplane on Failure
        if: steps.frontend.outputs.healthy == 'false' || steps.backend.outputs.healthy == 'false'
        run: |
          curl -X POST "${{ secrets.SUPERPLANE_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPERPLANE_API_TOKEN }}" \
            -d '{
              "event": "health_check_failed",
              "frontend_status": "${{ steps.frontend.outputs.status }}",
              "backend_status": "${{ steps.backend.outputs.status }}",
              "frontend_healthy": ${{ steps.frontend.outputs.healthy }},
              "backend_healthy": ${{ steps.backend.outputs.healthy }},
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'

      - name: Fail workflow if unhealthy
        if: steps.frontend.outputs.healthy == 'false' || steps.backend.outputs.healthy == 'false'
        run: |
          echo "Health check failed!"
          echo "Frontend: ${{ steps.frontend.outputs.healthy }} (HTTP ${{ steps.frontend.outputs.status }})"
          echo "Backend: ${{ steps.backend.outputs.healthy }} (HTTP ${{ steps.backend.outputs.status }})"
          exit 1

      - name: Notify on Success (if requested)
        if: inputs.notify_on_success && steps.frontend.outputs.healthy == 'true' && steps.backend.outputs.healthy == 'true'
        run: |
          echo "All services are healthy"
          echo "Frontend: HTTP ${{ steps.frontend.outputs.status }}"
          echo "Backend: HTTP ${{ steps.backend.outputs.status }}"
