services:
  # redis:
  #   image: redis:7-alpine
  #   command: ["redis-server", "--appendonly", "yes"]
  #   volumes:
  #     - redis-data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #   restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file: .env.prod
    expose:
      - "8000"
    # depends_on:
    #   redis:
    #     condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(''http://127.0.0.1:8000/healthz'').status == 200 else 1)"',
        ]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: ["python", "worker.py"]
    env_file: .env.prod
    # depends_on:
    #   redis:
    #     condition: service_healthy
    profiles:
      - worker
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    env_file: .env.prod
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/api/health'').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2.9-alpine
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    env_file: .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  # redis-data:
  caddy-data:
  caddy-config:
