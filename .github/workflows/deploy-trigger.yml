name: Trigger Superplane Deployment

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: "latest"
      skip_health_check:
        description: "Skip pre-deployment health check"
        required: false
        type: boolean
        default: false

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Get commit SHA
        id: get-sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
            echo "tag=sha-${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Superplane Deployment Workflow
        run: |
          curl -X POST "${{ secrets.SUPERPLANE_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPERPLANE_API_TOKEN }}" \
            -d '{
              "event": "deploy",
              "repository": "${{ github.repository }}",
              "ref": "${{ github.ref }}",
              "sha": "${{ steps.get-sha.outputs.sha }}",
              "image_tag": "${{ steps.get-sha.outputs.tag }}",
              "skip_health_check": ${{ inputs.skip_health_check || false }},
              "triggered_by": "${{ github.actor }}",
              "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
            }'

      - name: Post deployment status
        if: success()
        run: |
          echo "Deployment triggered successfully"
          echo "Image tag: ${{ steps.get-sha.outputs.tag }}"
          echo "Superplane will handle the deployment"
